services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: subvora_dev
      POSTGRES_USER: subvora
      POSTGRES_PASSWORD: subvora_dev_password
    ports:
      - "5433:5432"
    volumes:
      - subvora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subvora -d subvora_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/SubVora.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  subvora_pg_data:
