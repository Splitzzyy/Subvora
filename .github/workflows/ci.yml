name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore SubVora.slnx

      - name: Build
        run: dotnet build SubVora.slnx --no-restore -c Release

      - name: Test
        run: dotnet test SubVora.slnx --no-build -c Release
