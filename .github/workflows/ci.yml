name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  backend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Test each backend project directly rather than restoring/building the whole
      # SubVora.slnx: on Linux, SubVora.Mobile only exposes net10.0-android (its ios/
      # maccatalyst/windows TFMs are conditioned out on this OS), so SubVora.Mobile.Tests
      # (which targets net10.0-windows unconditionally) can never resolve its ProjectReference
      # here - that project's tests run on the windows-latest job below instead.
      - name: Test API project
        run: dotnet test tests/SubVora.Api.Tests/SubVora.Api.Tests.csproj -c Release

      - name: Test Application project
        run: dotnet test tests/SubVora.Application.Tests/SubVora.Application.Tests.csproj -c Release

      - name: Test Infrastructure project
        run: dotnet test tests/SubVora.Infrastructure.Tests/SubVora.Infrastructure.Tests.csproj -c Release

  mobile-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui --ignore-failed-sources

      - name: Test
        run: dotnet test tests/SubVora.Mobile.Tests/SubVora.Mobile.Tests.csproj -c Release
